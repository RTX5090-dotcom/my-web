<section class="section">
<h2>Test the Model</h2>

<textarea id="message" rows="5" style="width:100%;"></textarea>
<br><br>
<button class="btn" onclick="classify()">Classify Message</button>

<h3 id="result"></h3>
</section>

<script>
function classify(){
let text = document.getElementById("message").value.toLowerCase();
if(text.includes("urgent") || text.includes("click") || text.includes("verify")){
document.getElementById("result").innerHTML = "⚠️ Likely Scam";
}
else if(text.includes("free") || text.includes("win")){
document.getElementById("result").innerHTML = "📩 Likely Spam";
}
else{
document.getElementById("result").innerHTML = "✅ Likely Safe";
}
}
</script>
